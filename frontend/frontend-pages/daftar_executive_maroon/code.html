<script>
        function switchTab(tab) {
            const registerBtn = document.getElementById('tab-register');
            const loginBtn = document.getElementById('tab-login');
            const registerContent = document.getElementById('content-register');
            const loginContent = document.getElementById('content-login');

            if (tab === 'register') {
                registerBtn.className = 'flex-1 py-md font-label-bold text-label-bold text-primary-container border-b-2 border-primary-container bg-surface-container-low transition-colors';
                loginBtn.className = 'flex-1 py-md font-label-bold text-label-bold text-outline hover:text-primary-container transition-colors';
                registerContent.classList.add('active');
                loginContent.classList.remove('active');
            } else {
                loginBtn.className = 'flex-1 py-md font-label-bold text-label-bold text-primary-container border-b-2 border-primary-container bg-surface-container-low transition-colors';
                registerBtn.className = 'flex-1 py-md font-label-bold text-label-bold text-outline hover:text-primary-container transition-colors';
                loginContent.classList.add('active');
                registerContent.classList.remove('active');
            }
        }
