apiVersion: v1
kind: Pod
metadata:
  name: heurix-pod
  labels:
    app: heurix
spec:
  containers:
    # DATABASE CONTAINER (POSTGRES)
    - name: postgres
      image: postgres:16-alpine
      env:
        - name: POSTGRES_DB
          value: "${POSTGRES_DB}"
        - name: POSTGRES_USER
          value: "${POSTGRES_USER}"
        - name: POSTGRES_PASSWORD
          value: "${POSTGRES_PASSWORD}"
      volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      ports:
        - containerPort: 5432

    # BACKEND CONTAINER (FastAPI)
    - name: backend
      image: ghcr.io/dwi-wahyu/heurix-backend:latest
      env:
        # Karena di .env pakai db, sedangkan di Podman Kube semua container dalam satu pod
        # saling berkomunikasi lewat 'localhost', kita arahkan DATABASE_URL ke localhost.
        - name: DATABASE_URL
          value: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:5432/${POSTGRES_DB}"
        - name: GROQ_API_KEY
          value: "${GROQ_API_KEY}"
        - name: BETTER_AUTH_SECRET
          value: "${BETTER_AUTH_SECRET}"
        - name: BETTER_AUTH_URL
          value: "${BETTER_AUTH_URL}"
        - name: ORIGIN
          value: "${ORIGIN}"
        - name: GOOGLE_CLIENT_ID
          value: "${GOOGLE_CLIENT_ID}"
        - name: GOOGLE_CLIENT_SECRET
          value: "${GOOGLE_CLIENT_SECRET}"
        - name: MODEL_PATH
          value: "${MODEL_PATH}"
      ports:
        - containerPort: 8000

    # FRONTEND CONTAINER (SvelteKit)
    - name: frontend
      image: ghcr.io/dwi-wahyu/heurix-frontend:latest
      env:
        - name: PUBLIC_BACKEND_URL
          value: "${PUBLIC_BACKEND_URL}"
        - name: PUBLIC_BACKEND_WS
          value: "${PUBLIC_BACKEND_WS}"
        - name: PORT
          value: "${FRONTEND_PORT}"
      ports:
        - containerPort: 5000

  volumes:
    - name: postgres-data
      hostPath:
        path: /var/lib/heurix/postgres_data
        type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: heurix-service
spec:
  selector:
    app: heurix
  ports:
    - name: frontend
      port: 5000
      targetPort: 5000
      nodePort: 30000
  type: NodePort
