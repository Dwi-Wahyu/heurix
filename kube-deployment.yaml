apiVersion: v1
kind: Pod
metadata:
  name: hiready-pod
  labels:
    app: hiready
spec:
  containers:
    - name: postgres
      image: postgres:16-alpine
      env:
        - name: POSTGRES_DB
          value: "${POSTGRES_DB}"
        - name: POSTGRES_USER
          value: "${POSTGRES_USER}"
        - name: POSTGRES_PASSWORD
          value: "${POSTGRES_PASSWORD}"
      volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      ports:
        - containerPort: 5432

    - name: backend
      image: ghcr.io/dwi-wahyu/hiready-backend:latest
      env:
        - name: DATABASE_URL
          value: "${DATABASE_URL}"
        - name: GROQ_API_KEY
          value: "${GROQ_API_KEY}"
        - name: BETTER_AUTH_SECRET
          value: "${BETTER_AUTH_SECRET}"
        - name: BETTER_AUTH_URL
          value: "${BETTER_AUTH_URL}"
        - name: ORIGIN
          value: "${ORIGIN}"
        - name: GOOGLE_CLIENT_ID
          value: "${GOOGLE_CLIENT_ID}"
        - name: GOOGLE_CLIENT_SECRET
          value: "${GOOGLE_CLIENT_SECRET}"
      ports:
        - containerPort: 8000

    - name: frontend
      image: ghcr.io/dwi-wahyu/hiready-frontend:latest
      env:
        - name: PUBLIC_BACKEND_URL
          value: "${PUBLIC_BACKEND_URL}"
        - name: PUBLIC_BACKEND_WS
          value: "${PUBLIC_BACKEND_WS}"
      ports:
        - containerPort: 5000

  volumes:
    - name: postgres-data
      hostPath:
        path: /var/lib/hiready/postgres_data
        type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: hiready-service
spec:
  selector:
    app: hiready
  ports:
    - name: frontend
      port: 5000
      targetPort: 5000
      nodePort: 30000
  type: NodePort
