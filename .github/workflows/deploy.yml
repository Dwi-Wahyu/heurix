name: Build and Deploy HiReady

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # --- BUILD BACKEND ---
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          # Cache agar build python (pip) lebih cepat
          cache-from: type=registry,ref=ghcr.io/dwi-wahyu/hiready-backend:cache
          cache-to: type=registry,ref=ghcr.io/dwi-wahyu/hiready-backend:cache,mode=max
          tags: ghcr.io/dwi-wahyu/hiready-backend:latest

      # --- BUILD FRONTEND ---
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          no-cache: true
          # Build args untuk env yang dibutuhkan saat build-time (Next.js/SvelteKit)
          build-args: |
            PUBLIC_BACKEND_URL=${{ secrets.PUBLIC_BACKEND_URL }}
            PUBLIC_BACKEND_WS=${{ secrets.PUBLIC_BACKEND_WS }}
          tags: ghcr.io/dwi-wahyu/hiready-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Mapping semua Secrets agar bisa dikirim ke server via SSH
          DATABASE_URL: ${{ secrets.HIREADY_DATABASE_URL }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PUBLIC_BACKEND_URL: ${{ secrets.PUBLIC_BACKEND_URL }}
          PUBLIC_BACKEND_WS: ${{ secrets.PUBLIC_BACKEND_WS }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          ORIGIN: ${{ secrets.ORIGIN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          FRONTEND_PORT: 5000
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Mendaftarkan variabel agar tersedia di session shell server
          envs: DATABASE_URL,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,GROQ_API_KEY,PUBLIC_BACKEND_URL,PUBLIC_BACKEND_WS,BETTER_AUTH_SECRET,BETTER_AUTH_URL,ORIGIN,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,FRONTEND_PORT
          script: |
            cd /var/www/hiready

            # Podman: login ke GHCR
            echo "$GHCR_TOKEN" | podman login ghcr.io -u "$GH_ACTOR" --password-stdin

            # Tulis .env ke server
            # (sudah ada karena secrets di-set satu per satu, tapi docker-compose butuh file .env)
            cat > .env << EOF
            DATABASE_URL=$DATABASE_URL
            POSTGRES_DB=$POSTGRES_DB
            POSTGRES_USER=$POSTGRES_USER
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            GROQ_API_KEY=$GROQ_API_KEY
            PUBLIC_BACKEND_URL=$PUBLIC_BACKEND_URL
            PUBLIC_BACKEND_WS=$PUBLIC_BACKEND_WS
            BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET
            BETTER_AUTH_URL=$BETTER_AUTH_URL
            ORIGIN=$ORIGIN
            GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
            FRONTEND_PORT=$FRONTEND_PORT
            EOF

            # Tarik image terbaru
            podman-compose pull

            # Jalankan ulang service
            podman-compose up -d --remove-orphans

            # Hapus image lama
            podman image prune -af
