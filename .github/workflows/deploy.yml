name: Build and Deploy HiReady

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Tambahan: konversi repository name ke lowercase
      - name: Set lowercase repository name
        run: echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          cache-from: type=registry,ref=ghcr.io/${{ env.REPO_LOWER }}/hiready-backend:cache
          cache-to: type=registry,ref=ghcr.io/${{ env.REPO_LOWER }}/hiready-backend:cache,mode=max
          tags: ghcr.io/${{ env.REPO_LOWER }}/hiready-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            PUBLIC_BACKEND_URL=${{ secrets.PUBLIC_BACKEND_URL }}
            PUBLIC_BACKEND_WS=${{ secrets.PUBLIC_BACKEND_WS }}
          cache-from: type=registry,ref=ghcr.io/${{ env.REPO_LOWER }}/hiready-frontend:cache
          cache-to: type=registry,ref=ghcr.io/${{ env.REPO_LOWER }}/hiready-frontend:cache,mode=max
          tags: ghcr.io/${{ env.REPO_LOWER }}/hiready-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PUBLIC_BACKEND_URL: ${{ secrets.PUBLIC_BACKEND_URL }}
          PUBLIC_BACKEND_WS: ${{ secrets.PUBLIC_BACKEND_WS }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          ORIGIN: ${{ secrets.ORIGIN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          FRONTEND_PORT: 5000
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DATABASE_URL,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,GROQ_API_KEY,PUBLIC_BACKEND_URL,PUBLIC_BACKEND_WS,BETTER_AUTH_SECRET,BETTER_AUTH_URL,ORIGIN,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,FRONTEND_PORT,GHCR_TOKEN,GH_ACTOR
          script: |
            cd /var/www/hiready

            echo "$GHCR_TOKEN" | podman login ghcr.io -u "$GH_ACTOR" --password-stdin

            cat > .env << EOF
            DATABASE_URL=$DATABASE_URL
            POSTGRES_DB=$POSTGRES_DB
            POSTGRES_USER=$POSTGRES_USER
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            GROQ_API_KEY=$GROQ_API_KEY
            PUBLIC_BACKEND_URL=$PUBLIC_BACKEND_URL
            PUBLIC_BACKEND_WS=$PUBLIC_BACKEND_WS
            BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET
            BETTER_AUTH_URL=$BETTER_AUTH_URL
            ORIGIN=$ORIGIN
            GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
            FRONTEND_PORT=$FRONTEND_PORT
            EOF

            podman-compose pull
            podman-compose up -d --remove-orphans
            podman image prune -af
